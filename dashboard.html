<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MATO MEDIA TZ | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <img src="logo.png" alt="MATO MEDIA TZ" class="nav-logo">
            <div class="nav-user">
                <span id="user-name">Karibu, Mtumiaji</span>
                <button id="logout-btn" class="logout-icon"><i class="fas fa-sign-out-alt"></i> Toka</button>
            </div>
        </div>
    </nav>
    <main class="dashboard-main">
        <h2>Huduma Zetu</h2>
        <p class="subtitle">Chagua huduma unayohitaji, tutakusaidia kwa haraka</p>
        <div class="services-grid" id="services-grid"></div>
        <div class="requests-history">
            <h3>Maombi Yako</h3>
            <div id="requests-list">Hakuna maombi bado</div>
        </div>
    </main>
    <div id="chatbot-container"></div>
    <script type="module" src="app.js"></script>
    <script type="module" src="chatbot.js"></script>
</body>
</html>
